<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Breaking Talk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050505;
  --surface: rgba(255,255,255,.04);
  --border: rgba(255,255,255,.07);
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.38);
  --subtle: rgba(255,255,255,.18);

  --cat-gs:  #D4A017;
  --cat-hr:  #5B21B6;
  --cat-cn:  #0B7A75;
  --cat-id:  #1D4ED8;
  --cat-rh:  #1B1B3A;
  --cat-wc:  #C96A04;
  --cat-ch:  #B0004F;
  --cat-st:  #7A9EA1;
  --cat-sp:  #6E1124;
  --ac: #D4A017;

  --card-w: min(88vw, 580px);
  --card-h: min(76vh, 820px);
  --r: 38px;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: radial-gradient(circle at 50% 0%, #1B1B1B 0%, #090909 45%, #050505 100%);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; position: relative; overflow: hidden;
}

/* ── Noise overlay ──────────────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px;
  opacity: .03;
  mix-blend-mode: overlay;
}

/* ══════════════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

.sp-ambient {
  position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
  width: 700px; height: 700px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 65%);
}

/* Floating cards on splash */
.sp-floats { position: absolute; inset: 0; pointer-events: none; }
.sp-f {
  position: absolute; border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
  border: 1px solid rgba(255,255,255,.05);
  animation: floatCard var(--dur, 10s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
.sp-f:nth-child(1){width:62px;height:88px;top:6%;left:4%;transform:rotate(-8deg);--dur:11s;--delay:0s}
.sp-f:nth-child(2){width:52px;height:76px;top:9%;right:6%;transform:rotate(6deg);--dur:13s;--delay:-3s}
.sp-f:nth-child(3){width:70px;height:100px;bottom:9%;left:6%;transform:rotate(5deg);--dur:9s;--delay:-1.5s}
.sp-f:nth-child(4){width:56px;height:80px;bottom:7%;right:5%;transform:rotate(-6deg);--dur:14s;--delay:-5s}
.sp-f:nth-child(5){width:42px;height:60px;top:44%;left:3%;transform:rotate(-3deg);opacity:.4;--dur:12s;--delay:-2s}
.sp-f:nth-child(6){width:46px;height:66px;top:42%;right:3%;transform:rotate(4deg);opacity:.4;--dur:10s;--delay:-4s}

@keyframes floatCard {
  0%,100% { transform: rotate(var(--r0, -8deg)) translateY(0px); }
  50%      { transform: rotate(var(--r0, -8deg)) translateY(-14px); }
}

.sp-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: .35em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 20px;
  animation: fadeUp .9s cubic-bezier(.22,1,.36,1) both;
  position: relative; z-index: 1;
}
.sp-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(72px, 14vw, 112px);
  color: var(--text); line-height: .9;
  text-align: center; letter-spacing: -.04em;
  animation: fadeUp .9s .08s cubic-bezier(.22,1,.36,1) both;
  margin-bottom: 28px; position: relative; z-index: 1;
}
.sp-sub {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300; font-size: 1.05rem; color: rgba(255,255,255,.55);
  text-align: center; max-width: 320px; line-height: 1.7;
  margin-bottom: 48px;
  animation: fadeUp .9s .16s cubic-bezier(.22,1,.36,1) both;
  position: relative; z-index: 1;
}
.sp-cta {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: #050505; background: #F0F0F0;
  border: none; border-radius: 999px;
  height: 60px; padding: 0 42px;
  cursor: pointer; transition: transform .4s cubic-bezier(.22,1,.36,1), box-shadow .4s ease;
  animation: fadeUp .9s .24s cubic-bezier(.22,1,.36,1) both;
  position: relative; z-index: 1;
  box-shadow: 0 0 0 rgba(255,255,255,0);
}
.sp-cta:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 48px rgba(255,255,255,.08);
}

/* ══════════════════════════════════════════════════════════
   GAME LAYOUT
══════════════════════════════════════════════════════════ */
#game {
  display: none; flex-direction: column;
  align-items: center; width: 100%;
  gap: 0; position: relative; z-index: 1;
}

/* Ambient glow behind card */
.ambient-glow {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.04), transparent 70%);
  filter: blur(80px);
  pointer-events: none; z-index: 0;
  transition: opacity 1.2s ease;
}

/* Player metadata bar */
.meta-bar {
  font-size: .72rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); text-align: center;
  margin-bottom: 32px;
  animation: fadeDown .8s cubic-bezier(.22,1,.36,1) both;
}
.meta-bar span { opacity: .5; margin: 0 6px; }

/* ── Deck area ──────────────────────────────────────────── */
.deck-area {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: fadeUp .8s .06s cubic-bezier(.22,1,.36,1) both;
}

/* Wildcard companion */
.wc-card {
  width: 0; overflow: hidden; opacity: 0;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(201,106,4,.18), rgba(201,106,4,.06));
  border: 1px solid rgba(201,106,4,.2);
  display: flex; flex-direction: column;
  align-items: center; padding: 0; gap: 10px;
  transform: rotate(-3deg) scale(.88);
  transition:
    width .5s cubic-bezier(.34,1.2,.64,1),
    padding .5s cubic-bezier(.34,1.2,.64,1),
    margin-right .5s cubic-bezier(.34,1.2,.64,1),
    opacity .4s ease,
    transform .5s cubic-bezier(.34,1.2,.64,1);
  pointer-events: none; align-self: center; flex-shrink: 0;
}
.wc-card.visible {
  width: 140px; margin-right: 16px;
  padding: 20px 14px 18px;
  opacity: 1; transform: rotate(-2deg) scale(1);
  pointer-events: auto;
}
.wc-badge {
  font-size: 9px; font-weight: 600; letter-spacing: .28em; text-transform: uppercase;
  color: rgba(201,106,4,.8); text-align: center; white-space: nowrap;
}
.wc-line { width: 28px; height: 1px; background: rgba(201,106,4,.2); }
.wc-text {
  font-size: 12px; font-weight: 400; color: rgba(255,255,255,.75);
  text-align: center; line-height: 1.55; flex: 1;
}

/* ── Main card deck ─────────────────────────────────────── */
.deck {
  position: relative;
  width: var(--card-w); height: var(--card-h);
}

.ghost {
  position: absolute; inset: 0;
  border-radius: var(--r); pointer-events: none;
}
.ghost-2 {
  background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.006));
  border: 1px solid var(--border);
  transform: translate(10px, 12px) rotate(3deg);
  z-index: 1;
}
.ghost-1 {
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  border: 1px solid rgba(255,255,255,.09);
  transform: translate(5px, 5px) rotate(1.5deg);
  z-index: 2;
}

.card {
  position: absolute; top: 0; left: 0;
  width: var(--card-w); height: var(--card-h);
  border-radius: var(--r); z-index: 10;
  cursor: pointer; user-select: none; touch-action: none;
  will-change: transform; overflow: hidden;
}

.card-face {
  position: absolute; inset: 0; border-radius: var(--r);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3.5rem 2.8rem;
  transition: opacity .5s cubic-bezier(.22,1,.36,1);
}

/* BACK face */
.card-back {
  background: linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.02) 100%);
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 60px 120px rgba(0,0,0,.55), 0 0 160px rgba(255,255,255,.04);
}
.back-badge {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 500; letter-spacing: .3em; text-transform: uppercase;
  color: var(--subtle);
}
.back-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center; margin-bottom: 1.4rem;
}
.back-icon svg { width: 24px; height: 24px; stroke: var(--subtle); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.back-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; color: rgba(255,255,255,.7);
  margin-bottom: 8px; text-align: center; letter-spacing: -.02em;
}
.back-sub {
  font-size: 13px; font-weight: 300; color: var(--muted);
  text-align: center; line-height: 1.65; max-width: 200px;
}
.back-swipe {
  position: absolute; bottom: 32px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 32px;
  font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase;
}

/* FRONT face */
.card-front { opacity: 0; pointer-events: none; }
.card-front.vis { opacity: 1; pointer-events: auto; }
.card-back.gone { opacity: 0; pointer-events: none; }

/* Grain texture on front */
.card-front::before {
  content: '';
  position: absolute; inset: 0; border-radius: var(--r);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.06'/%3E%3C/svg%3E");
  background-size: 150px;
  opacity: .5; mix-blend-mode: overlay; pointer-events: none; z-index: 2;
}

/* Soft top bloom */
.card-front::after {
  content: '';
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
  pointer-events: none; z-index: 1;
}

.cat-lbl {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  font-size: .66rem; letter-spacing: .35em; text-transform: uppercase;
  color: rgba(255,255,255,.55); font-weight: 500; white-space: nowrap; z-index: 3;
}
.q-text {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.6rem, 4.2vw, 3rem);
  font-weight: 400; color: var(--qt, #FFFFFF);
  text-align: center; line-height: 1.12;
  letter-spacing: -.03em; z-index: 3;
  max-width: 78%;
}
.tap-next {
  position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
  font-size: .68rem; font-weight: 500; letter-spacing: .18em;
  text-transform: uppercase; opacity: .28; color: var(--qt, #FFFFFF); z-index: 3;
}

/* Swipe indicators */
.sw-yes, .sw-no {
  position: absolute; top: 26px;
  font-size: 10px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 6px;
  opacity: 0; pointer-events: none; z-index: 20;
}
.sw-yes { right: 20px; border: 1.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); }
.sw-no  { left: 20px;  border: 1.5px solid rgba(255,255,255,.15); color: rgba(255,255,255,.45); }

/* ── Progress ───────────────────────────────────────────── */
.prog-wrap {
  width: var(--card-w); margin-bottom: 24px;
  animation: fadeUp .8s .1s cubic-bezier(.22,1,.36,1) both;
}
.prog-bar { height: 1px; background: rgba(255,255,255,.08); overflow: hidden; }
.prog-fill { height: 100%; background: rgba(255,255,255,.22); transition: width .6s cubic-bezier(.22,1,.36,1); }
.prog-txt {
  font-size: 10px; color: var(--muted); text-align: right; font-weight: 500;
  letter-spacing: .12em; text-transform: uppercase; margin-top: 8px;
}

/* ── Floating dock controls ─────────────────────────────── */
.controls {
  display: flex; gap: 10px; align-items: center;
  animation: fadeUp .8s .14s cubic-bezier(.22,1,.36,1) both;
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 52px; padding: 0 22px; border-radius: 999px;
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.08);
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem; font-weight: 500; letter-spacing: .04em;
  color: rgba(255,255,255,.65); cursor: pointer;
  transition: transform .35s cubic-bezier(.22,1,.36,1), background .25s ease, color .25s ease;
}
.ctrl-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,.1); color: rgba(255,255,255,.9); }
.ctrl-btn:active { transform: translateY(0); }
.ctrl-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.ctrl-btn.icon-only { padding: 0; width: 52px; }
.ctrl-btn.primary {
  background: rgba(255,255,255,.14);
  color: rgba(255,255,255,.95);
  border-color: rgba(255,255,255,.14);
}
.ctrl-btn.primary:hover { background: rgba(255,255,255,.2); }
.ctrl-btn:disabled { opacity: .28; pointer-events: none; }

/* ── Category drawer ────────────────────────────────────── */
.cat-wrap { position: relative; }
.cat-toggle {
  display: flex; align-items: center; gap: 7px;
  height: 38px; padding: 0 16px; border-radius: 999px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); cursor: pointer; transition: all .25s ease;
  white-space: nowrap;
}
.cat-toggle:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
.cat-toggle svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

.cat-panel {
  display: none; position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  background: rgba(18,18,18,.95);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px; padding: 10px; z-index: 9999;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
  min-width: 210px;
  max-height: 320px; overflow-y: auto;
}
.cat-panel.open { display: block; }
.cat-option {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 12px;
  font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); cursor: pointer; transition: all .15s; user-select: none;
}
.cat-option:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.8); }
.cat-option input { display: none; }
.cat-check {
  width: 16px; height: 16px; border-radius: 5px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.cat-option input:checked ~ .cat-check {
  background: rgba(255,255,255,.85); border-color: transparent;
}
.cat-check svg { display: none; width: 9px; height: 9px; stroke: #050505; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.cat-option input:checked ~ .cat-check svg { display: block; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-divider { height: 1px; background: rgba(255,255,255,.06); margin: 4px 0; }

/* ══════════════════════════════════════════════════════════
   DONE SCREEN
══════════════════════════════════════════════════════════ */
#done {
  display: none; flex-direction: column; align-items: center; text-align: center;
  gap: 1.2rem; padding: 2rem; animation: fadeUp .8s ease both; position: relative; z-index: 1;
}
.done-glyph {
  font-family: 'DM Serif Display', serif;
  font-size: 64px; line-height: 1; margin-bottom: 8px;
  color: rgba(255,255,255,.15);
}
#done h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 40px; color: rgba(255,255,255,.8); letter-spacing: -.03em; line-height: 1;
}
#done p {
  font-size: 14px; font-weight: 300; color: var(--muted);
  max-width: 280px; line-height: 1.7;
}

/* ══════════════════════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════════════════════ */
@keyframes fadeUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardIn   { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.popin { animation: cardIn .5s cubic-bezier(.22,1,.36,1) both; }

/* Scrollbar styling */
.cat-panel::-webkit-scrollbar { width: 4px; }
.cat-panel::-webkit-scrollbar-track { background: transparent; }
.cat-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══ SPLASH ════════════════════════════════════════════ -->
<div id="splash">
  <div class="sp-ambient"></div>
  <div class="sp-floats">
    <div class="sp-f"></div><div class="sp-f"></div>
    <div class="sp-f"></div><div class="sp-f"></div>
    <div class="sp-f"></div><div class="sp-f"></div>
  </div>
  <div class="sp-eyebrow">card game</div>
  <div class="sp-title">Breaking<br>Talk</div>
  <div class="sp-sub">Questions that go deeper than small talk.</div>
  <button class="sp-cta" onclick="startGame()">Start the conversation</button>
</div>

<!-- ═══ AMBIENT GLOW ══════════════════════════════════════ -->
<div class="ambient-glow" id="ambientGlow"></div>

<!-- ═══ GAME ══════════════════════════════════════════════ -->
<div id="game">
  <div class="meta-bar" id="metaBar">Player 1 <span>·</span> Connection</div>

  <div class="deck-area">
    <!-- Wildcard companion -->
    <div class="wc-card" id="wcCard">
      <div class="wc-badge">Wildcard</div>
      <div class="wc-line"></div>
      <div class="wc-text" id="wcText"></div>
    </div>

    <!-- Main deck -->
    <div class="deck">
      <div class="ghost ghost-2"></div>
      <div class="ghost ghost-1"></div>
      <div class="card" id="card">
        <!-- BACK -->
        <div class="card-face card-back" id="cBack">
          <div class="back-badge">Breaking Talk</div>
          <div class="back-icon">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </div>
          <div class="back-title">Tap to reveal</div>
          <div class="back-sub">Let's actually talk.</div>
          <div class="back-swipe">
            <span>← skip</span>
            <span>keep →</span>
          </div>
        </div>
        <!-- FRONT -->
        <div class="card-face card-front" id="cFront">
          <div class="cat-lbl" id="catLbl"></div>
          <div class="q-text" id="qTxt"></div>
          <div class="tap-next">tap to continue</div>
        </div>
        <div class="sw-no"  id="swNo">Skip</div>
        <div class="sw-yes" id="swYes">Keep</div>
      </div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-txt" id="pTxt">0 of 0</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn icon-only" id="prevBtn" onclick="prev()" disabled>
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>

  {"q":"The other person chooses if you explain more or move on."},{"q":"Give the answer you secretly hope is true."},
  {"q":"You both answer using only three words."},{"q":"Say the answer that would expose your pattern."},
  {"q":"The other person gets one brutally honest comment after your answer."},{"q":"End your answer with: 'and that explains a lot.'"},
  {"q":"Answer like you're getting exposed on a podcast."},{"q":"Tell the story with way too much confidence."},
  {"q":"You have to make your answer sound attractive somehow."},{"q":"Say your answer like it's the trailer for a toxic relationship."},
  {"q":"The other person must react dramatically to your answer."},{"q":"Explain your answer like a PR apology."},
  {"q":"You must answer while trying not to laugh."},{"q":"Make your answer sound like a red flag disguised as a green flag."},
  {"q":"The other person chooses a fake title for your autobiography based on your answer."},
  {"q":"Say your answer like you're trying to flirt your way out of it."},{"q":"Explain your answer like a conspiracy theory."},
  {"q":"Your answer needs a fake inspirational quote at the end."},{"q":"Tell the story like your friends tell it when you're not there."},
  {"q":"Answer like you're the problem and you know it."},{"q":"The other person must guess what age you were when this happened."},
  {"q":"Say your answer like a reality show confessional."},{"q":"Turn your answer into a clickbait headline."},
  {"q":"Give your answer, then defend why it 'builds character.'"},{"q":"End your answer like you just learned nothing from the experience."},
  {"q":"Tell your answer like this is the beginning of your villain arc."},
{"q":"Would you rather have your ex's name tattooed on your forehead or tiny easter egg tattoos everywhere?"},

];

const Q = [...Q1, ...Q2];

// ─── State ────────────────────────────────────────────────
let deck=[], idx=0, flipped=false, player=1;
let dragging=false, sx=0, sy=0, dx=0, dy=0;

// ─── Helpers ──────────────────────────────────────────────
function catCfg(c){ return CAT[c] || CAT["RABBIT HOLE"]; }
function setTheme(c){
  const cfg = catCfg(c);
  document.getElementById('card').style.setProperty('--cat-accent', cfg.accent);
}
function updateGlow(c){
  const cfg = catCfg(c);
  const glow = document.getElementById('ambientGlow');
  glow.style.background = `radial-gradient(circle, ${cfg.accent}18, transparent 70%)`;
}

// ─── Game flow ────────────────────────────────────────────
function startGame(){
  const s = document.getElementById('splash');
  s.style.transition = 'opacity .6s ease';
  s.style.opacity = '0';
  setTimeout(()=>{
    s.style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    resetGame();
  }, 600);
}
function goHome(){
  document.getElementById('game').style.display = 'none';
  document.getElementById('done').style.display = 'none';
  const s = document.getElementById('splash');
  s.style.display = 'flex'; s.style.opacity = '1'; s.style.transition = '';
  document.querySelectorAll('.cat-chk').forEach(c=>c.checked=false);
  document.getElementById('chkAll').checked = true;
  updateCatBtn();
}
function toggleCatPanel(){
  document.getElementById('catPanel').classList.toggle('open');
}
document.addEventListener('click', e=>{
  const wrap = document.querySelector('.cat-wrap');
  if(wrap && !wrap.contains(e.target)) document.getElementById('catPanel').classList.remove('open');
});
function selectedCats(){
  const chkAll = document.getElementById('chkAll');
  if(chkAll.checked) return null;
  const checked = [...document.querySelectorAll('.cat-chk:checked')].map(c=>c.value);
  return checked.length ? checked : null;
}
function updateCatBtn(){
  const cats = selectedCats();
  const btn = document.getElementById('catBtn');
  if(!cats || cats.length === 0) btn.innerHTML = 'All <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><polyline points="6 9 12 15 18 9"/></svg>';
  else if(cats.length === 1) btn.innerHTML = cats[0].split(' ')[0] + ' <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><polyline points="6 9 12 15 18 9"/></svg>';
  else btn.innerHTML = cats.length + ' cats <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><polyline points="6 9 12 15 18 9"/></svg>';
}
function onChkAll(el){
  if(el.checked) document.querySelectorAll('.cat-chk').forEach(c=>c.checked=false);
  updateCatBtn(); resetGame();
}
function onChkCat(){
  const anyChecked = [...document.querySelectorAll('.cat-chk:checked')].length > 0;
  document.getElementById('chkAll').checked = !anyChecked;
  updateCatBtn(); resetGame();
}
function filtered(){
  const cats = selectedCats();
  return (!cats || cats.length===0) ? Q : Q.filter(q=>cats.includes(q.c));
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function injectWildcards(qs){
  const wcPool = shuffle([...WILDCARDS]);
  let wi=0;
  return qs.map(q=>{
    if(Math.random()<0.08) return {...q, _wc: wcPool[wi++ % wcPool.length].q};
    return q;
  });
}
function resetGame(){
  const base = shuffle(filtered());
  deck = injectWildcards(base);
  idx=0; flipped=false;
  document.getElementById('game').style.display='flex';
  document.getElementById('done').style.display='none';
  if(deck[0]) { setTheme(deck[0].c); updateGlow(deck[0].c); }
  renderCard(); updateProg();
}

function renderCard(){
  flipped=false;
  const c = document.getElementById('card');
  c.style.transform=''; c.style.opacity='1'; c.style.transition='';
  document.getElementById('cBack').classList.remove('gone');
  document.getElementById('cFront').classList.remove('vis');
  c.classList.add('popin'); setTimeout(()=>c.classList.remove('popin'), 500);
  document.getElementById('swYes').style.opacity='0';
  document.getElementById('swNo').style.opacity='0';
  // Wildcard
  const item = deck[idx];
  const wc = document.getElementById('wcCard');
  if(item && item._wc){
    document.getElementById('wcText').textContent = item._wc;
    wc.classList.add('visible');
  } else {
    wc.classList.remove('visible');
  }
}

function showFront(){
  if(idx>=deck.length) return;
  const item = deck[idx];
  const cfg = catCfg(item.c);
  document.getElementById('catLbl').textContent = item.c;
  document.getElementById('qTxt').textContent = item.q;
  const front = document.getElementById('cFront');
  front.style.background = cfg.bg;
  front.style.boxShadow = `0 60px 120px rgba(0,0,0,.6), 0 0 160px ${cfg.accent}18`;
  front.style.setProperty('--qt', cfg.tx);
  document.getElementById('cBack').classList.add('gone');
  front.classList.add('vis');
  // Update glow on reveal
  document.getElementById('ambientGlow').style.background = `radial-gradient(circle, ${cfg.accent}22, transparent 70%)`;
}

function onCardAction(){
  if(!flipped){ flipped=true; showFront(); }
  else { next(); }
}
function next(){
  animOut('right',()=>{
    idx++;
    if(idx>=deck.length){ showDone(); return; }
    setTheme(deck[idx].c); updateGlow(deck[idx].c);
    togglePlayerUI(); renderCard(); updateProg();
  });
}
function skip(){
  animOut('left',()=>{
    idx++;
    if(idx>=deck.length){ showDone(); return; }
    setTheme(deck[idx].c); updateGlow(deck[idx].c);
    renderCard(); updateProg();
  });
}
function togglePlayerUI(){
  player = player===1 ? 2 : 1;
  document.getElementById('playerLabel').textContent = 'P'+player;
  updateMeta();
}
function toggleP(){
  player = player===1 ? 2 : 1;
  document.getElementById('playerLabel').textContent = 'P'+player;
  updateMeta();
}
function updateMeta(){
  const item = deck[idx];
  const cat = item ? item.c : '';
  document.getElementById('metaBar').innerHTML = `Player ${player} <span>·</span> ${cat}`;
}
function prev(){
  if(idx<=0) return;
  animIn('left',()=>{
    idx--;
    setTheme(deck[idx].c); updateGlow(deck[idx].c);
    renderCard(); updateProg();
  });
}
function animIn(dir, cb){
  const c = document.getElementById('card');
  const startX = dir==='left' ? -560 : 560;
  c.style.transition='none';
  c.style.transform=`translateX(${startX}px) rotate(${dir==='left'?-10:10}deg)`;
  c.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    cb();
    requestAnimationFrame(()=>{
      c.style.transition='transform .7s cubic-bezier(.22,1,.36,1), opacity .5s ease';
      c.style.transform='';
      c.style.opacity='1';
    });
  }));
}
function animOut(dir, cb){
  const c = document.getElementById('card');
  const tx = dir==='right' ? 560 : -560;
  const rot = dir==='right' ? 14 : -14;
  c.style.transition='transform .55s cubic-bezier(.4,0,1,1), opacity .45s ease';
  c.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
  c.style.opacity='0';
  setTimeout(cb, 520);
}
function updateProg(){
  const t=deck.length, pct=t>0?Math.round((idx/t)*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pTxt').textContent=idx+' of '+t;
  const prevBtn=document.getElementById('prevBtn');
  prevBtn.disabled=idx<=0;
  if(idx<=0) prevBtn.setAttribute('disabled',''); else prevBtn.removeAttribute('disabled');
  updateMeta();
}
function showDone(){
  document.getElementById('game').style.display='none';
  document.getElementById('done').style.display='flex';
}

// ─── Pointer / drag ───────────────────────────────────────
const card = document.getElementById('card');
card.addEventListener('click', ()=>{
  if(Math.abs(dx)>=8) return;
  if(!flipped){ flipped=true; showFront(); }
  else { next(); }
});
card.addEventListener('pointerdown', e=>{
  dragging=true; sx=e.clientX; sy=e.clientY; dx=0; dy=0;
  card.setPointerCapture(e.pointerId); card.style.transition='none';
});
card.addEventListener('pointermove', e=>{
  if(!dragging) return;
  dx=e.clientX-sx; dy=e.clientY-sy;
  card.style.transform=`translateX(${dx}px) translateY(${dy*.18}px) rotate(${dx*.05}deg)`;
  const r=Math.min(Math.abs(dx)/110,1);
  document.getElementById('swYes').style.opacity=dx>20?r:'0';
  document.getElementById('swNo').style.opacity=dx<-20?r:'0';
});
card.addEventListener('pointerup', ()=>{
  if(!dragging) return; dragging=false;
  document.getElementById('swYes').style.opacity='0';
  document.getElementById('swNo').style.opacity='0';
  if(Math.abs(dx)>90){ if(dx>0) next(); else skip(); }
  else {
    card.style.transition='transform .5s cubic-bezier(.34,1.3,.64,1)';
    card.style.transform='';
  }
});
card.addEventListener('pointercancel', ()=>{
  dragging=false;
  card.style.transition='transform .4s ease';
  card.style.transform='';
});
</script>
</body>
</html>
