<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breaking Talk</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Outfit:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-app:       #0E0D0C;
            --ink-on-dark:  #F6F4EE;
            --muted-dark:   rgba(246,244,238,0.45);
            --card-cream:   #F6F4EE;
            --card-w: min(85vw, 320px);
            --card-h: min(75vh, 448px);
        }

        body.light-mode {
            --bg-app:       #D8D4C8;
            --ink-on-dark:  #0E0D0C;
            --muted-dark:   rgba(0,0,0,0.45);
        }

        body.neon-mode {
            --bg-app:       #060612;
            --ink-on-dark:  #E8F4FF;
            --muted-dark:   rgba(180,220,255,0.5);
            --card-cream:   #E8F4FF;
            --neon-cyan:    #00E5FF;
            --neon-magenta: #FF00E5;
            --neon-lime:    #39FF14;
            --neon-glow-sm: 0 0 8px rgba(0,229,255,0.35);
            --neon-glow-md: 0 0 16px rgba(0,229,255,0.45);
            --neon-glow-lg: 0 0 24px rgba(0,229,255,0.55);
            --neon-border:  rgba(0,229,255,0.4);
            --neon-border-strong: rgba(0,229,255,0.6);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg-app);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--ink-on-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 180px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }
        body.neon-mode::before {
            opacity: 0.7;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* ═══════════ SPLASH ═══════════ */
        #splash {
            position: fixed;
            inset: 0;
            background: #0C0B0A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 0;
            transition: background 0.4s ease;
        }
        body.light-mode #splash { background: #FFFFFF; }
        body.neon-mode #splash { background: #050510; }

        .sp-deco-cards {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .sp-card-ghost {
            position: absolute;
            width: 60px;
            height: 86px;
            border-radius: 8px;
            border: 1px solid rgba(246, 244, 238, 0.08);
            background: rgba(246, 244, 238, 0.025);
            transition: border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        body.light-mode .sp-card-ghost {
            border-color: rgba(0, 0, 0, 0.08);
            background: rgba(0, 0, 0, 0.02);
        }
        body.neon-mode .sp-card-ghost {
            border-color: rgba(0, 229, 255, 0.15);
            background: rgba(0, 229, 255, 0.03);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.08);
        }
        .sp-card-ghost:nth-child(1) { top: 6%;
            left: 4%;
            transform: rotate(-16deg); }
        .sp-card-ghost:nth-child(2) { top: 9%;
            right: 6%;
            transform: rotate(13deg); }
        .sp-card-ghost:nth-child(3) { bottom: 9%;
            left: 6%;
            transform: rotate(10deg); }
        .sp-card-ghost:nth-child(4) { bottom: 7%;
            right: 5%;
            transform: rotate(-11deg); }
        .sp-card-ghost:nth-child(5) { top: 40%;
            left: 1%;
            transform: rotate(-4deg);
            opacity: 0.5; }
        .sp-card-ghost:nth-child(6) { top: 38%;
            right: 1%;
            transform: rotate(5deg);
            opacity: 0.5; }

        .splash-mode-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(246, 244, 238, 0.1);
            border: 1px solid rgba(246, 244, 238, 0.25);
            border-radius: 4px;
            padding: 10px 16px;
            cursor: pointer;
            color: rgba(246, 244, 238, 0.8);
            transition: all 0.22s;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            z-index: 1;
        }
        .splash-mode-toggle:hover {
            background: rgba(246, 244, 238, 0.16);
            color: #fff;
            border-color: rgba(246, 244, 238, 0.5);
        }
        body.light-mode .splash-mode-toggle {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.15);
            color: rgba(0, 0, 0, 0.7);
        }
        body.light-mode .splash-mode-toggle:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #000;
            border-color: rgba(0, 0, 0, 0.3);
        }
        body.neon-mode .splash-mode-toggle {
            background: rgba(0, 229, 255, 0.06);
            border-color: rgba(0, 229, 255, 0.3);
            color: rgba(0, 229, 255, 0.85);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }
        body.neon-mode .splash-mode-toggle:hover {
            background: rgba(0, 229, 255, 0.12);
            color: #00E5FF;
            border-color: rgba(0, 229, 255, 0.55);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.25);
        }
        .splash-mode-toggle svg { width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round; }

        .sp-eyebrow {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(246, 244, 238, 0.3);
            margin-bottom: 20px;
            animation: fadeUp 0.7s ease both;
            position: relative;
            z-index: 1;
            transition: color 0.4s ease;
        }
        body.light-mode .sp-eyebrow { color: rgba(0, 0, 0, 0.3); }
        body.neon-mode .sp-eyebrow { color: rgba(0, 229, 255, 0.5);
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.3); }

        .sp-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: clamp(56px, 14vw, 92px);
            color: var(--card-cream);
            line-height: 0.88;
            text-align: center;
            letter-spacing: -3px;
            animation: fadeUp 0.7s 0.06s ease both;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        body.light-mode .sp-title { color: #0E0D0C; }
        body.neon-mode .sp-title {
            color: #E8F4FF;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.4), 0 0 60px rgba(0, 229, 255, 0.15);
        }

        .sp-rule {
            width: 28px;
            height: 1px;
            background: rgba(246, 244, 238, 0.2);
            margin-bottom: 20px;
            animation: fadeUp 0.7s 0.12s ease both;
            position: relative;
            z-index: 1;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        body.light-mode .sp-rule { background: rgba(0, 0, 0, 0.15); }
        body.neon-mode .sp-rule { background: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }

        .sp-sub {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: rgba(246, 244, 238, 0.5);
            text-align: center;
            max-width: 220px;
            line-height: 1.7;
            margin-bottom: 8px;
            animation: fadeUp 0.7s 0.17s ease both;
            position: relative;
            z-index: 1;
            transition: color 0.4s ease;
        }
        body.light-mode .sp-sub { color: rgba(0, 0, 0, 0.5); }
        body.neon-mode .sp-sub { color: rgba(180, 220, 255, 0.55); }

        .sp-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(246, 244, 238, 0.2);
            margin-bottom: 52px;
            animation: fadeUp 0.7s 0.22s ease both;
            position: relative;
            z-index: 1;
            transition: color 0.4s ease;
        }
        body.light-mode .sp-count { color: rgba(0, 0, 0, 0.2); }
        body.neon-mode .sp-count { color: rgba(0, 229, 255, 0.3); }

        .sp-play {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #0C0B0A;
            background: var(--card-cream);
            border: none;
            padding: 15px 56px;
            cursor: pointer;
            transition: all 0.22s;
            animation: fadeUp 0.7s 0.27s ease both;
            position: relative;
            z-index: 1;
            border-radius: 2px;
        }
        .sp-play:hover { transform: translateY(-2px);
            background: #fff;
            box-shadow: 0 8px 32px rgba(246, 244, 238, 0.15); }
        body.neon-mode .sp-play {
            background: #00E5FF;
            color: #050510;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }
        body.neon-mode .sp-play:hover {
            background: #33EAFF;
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.6), 0 8px 32px rgba(0, 229, 255, 0.3);
        }

        /* ═══════════ GAME ═══════════ */
        #game {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 1rem;
            gap: 0;
            position: relative;
            z-index: 1;
        }

        .topbar {
            width: 100%;
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            animation: fadeDown 0.5s ease both;
            position: relative;
            z-index: 50;
        }

        .home-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border: 1px solid rgba(246, 244, 238, 0.12);
            background: transparent;
            border-radius: 2px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: rgba(246, 244, 238, 0.6);
            cursor: pointer;
            transition: all 0.18s;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }
        .home-btn:hover { background: rgba(246, 244, 238, 0.06);
            color: var(--card-cream);
            border-color: rgba(246, 244, 238, 0.25); }
        .home-btn svg { width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round; }
        body.light-mode .home-btn { border-color: rgba(0, 0, 0, 0.12);
            color: rgba(0, 0, 0, 0.6); }
        body.light-mode .home-btn:hover { background: rgba(0, 0, 0, 0.04);
            color: #0E0D0C;
            border-color: rgba(0, 0, 0, 0.25); }
        body.neon-mode .home-btn {
            border-color: rgba(0, 229, 255, 0.2);
            color: rgba(180, 220, 255, 0.6);
        }
        body.neon-mode .home-btn:hover {
            background: rgba(0, 229, 255, 0.06);
            color: #00E5FF;
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .filter-wrap { flex: 1;
            position: relative; }
        .cat-btn {
            width: 100%;
            padding: 7px 28px 7px 12px;
            border: 1px solid rgba(246, 244, 238, 0.12);
            background: transparent;
            border-radius: 2px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: rgba(246, 244, 238, 0.6);
            cursor: pointer;
            outline: none;
            text-align: left;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }
        .cat-btn:hover,
        .cat-btn:focus { border-color: rgba(246, 244, 238, 0.28);
            color: var(--card-cream); }
        .cat-btn.wildcard-active { background: rgba(246, 244, 238, 0.08);
            color: var(--card-cream);
            border-color: rgba(246, 244, 238, 0.3); }
        body.light-mode .cat-btn { border-color: rgba(0, 0, 0, 0.12);
            color: rgba(0, 0, 0, 0.6); }
        body.light-mode .cat-btn:hover,
        body.light-mode .cat-btn:focus { border-color: rgba(0, 0, 0, 0.28);
            color: #0E0D0C; }
        body.light-mode .cat-btn.wildcard-active { background: rgba(0, 0, 0, 0.04);
            color: #0E0D0C;
            border-color: rgba(0, 0, 0, 0.25); }
        body.neon-mode .cat-btn {
            border-color: rgba(0, 229, 255, 0.2);
            color: rgba(180, 220, 255, 0.6);
        }
        body.neon-mode .cat-btn:hover,
        body.neon-mode .cat-btn:focus {
            border-color: rgba(0, 229, 255, 0.4);
            color: #00E5FF;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }
        body.neon-mode .cat-btn.wildcard-active {
            background: rgba(0, 229, 255, 0.08);
            color: #00E5FF;
            border-color: rgba(0, 229, 255, 0.45);
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.15);
        }

        .cat-panel {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #1A1917;
            border: 1px solid rgba(246, 244, 238, 0.15);
            border-radius: 4px;
            padding: 6px;
            z-index: 9999;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            max-height: 250px;
            overflow-y: auto;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        body.light-mode .cat-panel { background: #FFFFFF;
            border-color: rgba(0, 0, 0, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1); }
        body.neon-mode .cat-panel {
            background: #0A0A18;
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 229, 255, 0.1);
        }
        .cat-panel.open { display: block; }
        .cat-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 9px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: rgba(246, 244, 238, 0.7);
            transition: background 0.12s;
            user-select: none;
        }
        .cat-option:hover { background: rgba(246, 244, 238, 0.07);
            color: var(--card-cream); }
        body.light-mode .cat-option { color: rgba(0, 0, 0, 0.7); }
        body.light-mode .cat-option:hover { background: rgba(0, 0, 0, 0.04);
            color: #0E0D0C; }
        body.neon-mode .cat-option { color: rgba(180, 220, 255, 0.65); }
        body.neon-mode .cat-option:hover { background: rgba(0, 229, 255, 0.07);
            color: #00E5FF; }
        .cat-option input { display: none; }
        .cat-check {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            flex-shrink: 0;
            border: 1px solid rgba(246, 244, 238, 0.25);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
        }
        body.light-mode .cat-check { border-color: rgba(0, 0, 0, 0.25); }
        body.neon-mode .cat-check { border-color: rgba(0, 229, 255, 0.3); }
        .cat-option input:checked~.cat-check { background: var(--card-cream);
            border-color: var(--card-cream); }
        body.neon-mode .cat-option input:checked~.cat-check {
            background: #00E5FF;
            border-color: #00E5FF;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }
        .cat-check svg { display: none;
            width: 9px;
            height: 9px;
            stroke: #0C0B0A;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round; }
        body.neon-mode .cat-check svg { stroke: #050510; }
        .cat-option input:checked~.cat-check svg { display: block; }
        .cat-divider { height: 1px;
            background: rgba(246, 244, 238, 0.08);
            margin: 4px 0; }
        body.light-mode .cat-divider { background: rgba(0, 0, 0, 0.08); }
        body.neon-mode .cat-divider { background: rgba(0, 229, 255, 0.1); }

        .players {
            display: flex;
            background: rgba(246, 244, 238, 0.04);
            border: 1px solid rgba(246, 244, 238, 0.1);
            border-radius: 2px;
            padding: 3px;
            margin-bottom: 10px;
            animation: fadeDown 0.5s 0.03s ease both;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        body.light-mode .players { background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1); }
        body.neon-mode .players {
            background: rgba(0, 229, 255, 0.03);
            border-color: rgba(0, 229, 255, 0.15);
        }
        .player-btn {
            padding: 6px 20px;
            border: none;
            background: transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(246, 244, 238, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 1px;
        }
        body.light-mode .player-btn { color: rgba(0, 0, 0, 0.3); }
        body.neon-mode .player-btn { color: rgba(180, 220, 255, 0.35); }
        .player-btn.active { background: var(--card-cream);
            color: #0C0B0A; }
        body.light-mode .player-btn.active { background: #0E0D0C;
            color: #F6F4EE; }
        body.neon-mode .player-btn.active {
            background: #00E5FF;
            color: #050510;
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.5);
        }

        /* ═══════════ DECK & CARD ═══════════ */
        .deck {
            position: relative;
            width: var(--card-w);
            height: var(--card-h);
            margin: 0 auto 10px;
            animation: fadeUp 0.5s 0.05s ease both;
        }

        .ghost {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            pointer-events: none;
            border: 1px solid rgba(246, 244, 238, 0.04);
            transition: border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        body.light-mode .ghost { border-color: rgba(0, 0, 0, 0.04); }
        body.neon-mode .ghost {
            border-color: rgba(0, 229, 255, 0.12);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.05);
        }
        .ghost-2 { background: rgba(246, 244, 238, 0.02);
            transform: translate(8px, 8px) rotate(2.5deg);
            z-index: 1; }
        .ghost-1 { background: rgba(246, 244, 238, 0.04);
            transform: translate(4px, 4px) rotate(1.2deg);
            z-index: 2; }
        body.light-mode .ghost-2 { background: rgba(0, 0, 0, 0.02); }
        body.light-mode .ghost-1 { background: rgba(0, 0, 0, 0.04); }
        body.neon-mode .ghost-2 { background: rgba(0, 229, 255, 0.02); }
        body.neon-mode .ghost-1 { background: rgba(0, 229, 255, 0.04); }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            will-change: transform;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 4px 16px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.4s ease;
        }
        body.neon-mode .card {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 4px 16px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 229, 255, 0.1);
        }

        .card-face {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.3s ease;
            overflow: hidden;
        }

        .card-back {
            background: #141210;
            border: 1px solid rgba(246, 244, 238, 0.08);
            justify-content: center;

                corners.forEach(c => c.classList.remove('wildcard-q-shine'));
            }

            const totalQ = deck.filter(item => item.type !== 'wildcard').length;
            const seenQ = deck.slice(0, idx + 1).filter(item => item.type !== 'wildcard').length;
            document.getElementById('qNum').textContent = seenQ + ' / ' + totalQ;
            document.getElementById('cBack').classList.add('gone');
            front.classList.add('vis');
        }

        function updateCardColors() {
            if (idx >= deck.length) return;
            const item = deck[idx];
            const front = document.getElementById('cFront');
            if (!front.classList.contains('vis')) return;

            let cat;
            if (item.type === 'wildcard') cat = 'WILDCARDS';
            else cat = item.c;

            const catData = CAT[cat] || { color: '#2D2B2A', darkColor: '#1A1817', neonColor: '#00E5FF', neonBg: '#0A0A18' };
            const isLight = document.body.classList.contains('light-mode');
            const isNeon = document.body.classList.contains('neon-mode');
            if (isNeon) {
                front.style.background = catData.neonBg || catData.color;
                front.style.boxShadow = `0 0 40px ${catData.neonColor}55, 0 0 80px ${catData.neonColor}22, 0 20px 60px rgba(0,0,0,0.7)`;
                const frameEl = front.querySelector('.inner-frame');
                if (frameEl) frameEl.style.borderColor = `${catData.neonColor}50`;
            } else {
                const bgColor = isLight ? catData.color : catData.darkColor;
                front.style.background = bgColor;
                front.style.boxShadow = '';
                const frameEl = front.querySelector('.inner-frame');
                if (frameEl) frameEl.style.borderColor = 'rgba(255,255,255,0.3)';
            }

            const textColor = '#FFFFFF';
            const catLblEl = document.getElementById('catLbl');
            const catIconEl = document.getElementById('catIcon');
            const qTxtEl = document.getElementById('qTxt');
            const isWildcardFront = item.type === 'wildcard';
            const cornerEls = document.querySelectorAll('.corner-tl,.corner-tr,.corner-bl,.corner-br');

            if (isWildcardFront) {
                // Re-apply shimmer; clear inline styles so CSS class takes over
                [catLblEl, catIconEl, qTxtEl].forEach(el => {
                    el.classList.add('wildcard-q-shine');
                    el.style.color = '';
                    el.style.textShadow = '';
                });
                cornerEls.forEach(c => { c.classList.add('wildcard-q-shine'); c.style.color = ''; c.style.textShadow = ''; });
            } else {
                [catLblEl, catIconEl, qTxtEl].forEach(el => el.classList.remove('wildcard-q-shine'));
                cornerEls.forEach(c => c.classList.remove('wildcard-q-shine'));
                catLblEl.style.color = textColor;
                catIconEl.style.color = textColor;
                qTxtEl.style.color = textColor;
                cornerEls.forEach(c => c.style.color = textColor);
                if (isNeon && catData.neonColor) {
                    catLblEl.style.textShadow = `0 0 10px ${catData.neonColor}CC, 0 0 20px ${catData.neonColor}66`;
                    catIconEl.style.textShadow = `0 0 12px ${catData.neonColor}CC`;
                    qTxtEl.style.textShadow = `0 0 6px rgba(255,255,255,0.25)`;
                    cornerEls.forEach(c => { c.style.textShadow = `0 0 6px ${catData.neonColor}88`; });
                } else {
                    catLblEl.style.textShadow = '';
                    catIconEl.style.textShadow = '';
                    qTxtEl.style.textShadow = '';
                    cornerEls.forEach(c => { c.style.textShadow = ''; });
                }
            }
        }

        function _advance(dir) {
            const currentItem = deck[idx];
            animOut(dir, () => {
                history.push({ item: currentItem, playerBefore: player });
                if (currentItem && currentItem.type !== 'wildcard') toggleP();
                idx++;
                if (idx >= deck.length) { showDone(); return; }
                renderCard();
                updateProg();
            });
        }

        function next() { _advance('right'); }

        function skip() { _advance('left'); }

        function toggleP() {
            player = player === 1 ? 2 : 1;
            document.getElementById('t1').classList.toggle('active', player === 1);
            document.getElementById('t2').classList.toggle('active', player === 2);
        }

        function prev() {
            if (history.length === 0) return;
            animIn('left', () => {
                const entry = history.pop();
                player = entry.playerBefore;
                document.getElementById('t1').classList.toggle('active', player === 1);
                document.getElementById('t2').classList.toggle('active', player === 2);
                idx--;
                renderCard();
                updateProg();
            });
        }

        function animIn(dir, cb) {
            const c = document.getElementById('card');
            const startX = dir === 'left' ? -520 : 520;
            c.style.transition = 'none';
            c.style.transform = `translateX(${startX}px) rotate(${dir === 'left' ? -15 : 15}deg)`;
            c.style.opacity = '0';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                cb();
                requestAnimationFrame(() => {
                    c.style.transition =
                        'transform .35s cubic-bezier(.34,1.2,.64,1), opacity .25s ease';
                    c.style.transform = '';
                    c.style.opacity = '1';
                });
            }));
        }

        function animOut(dir, cb) {
            const c = document.getElementById('card');
            const tx = dir === 'right' ? 520 : -520,
                rot = dir === 'right' ? 18 : -18;
            c.style.transition = 'transform .3s cubic-bezier(.4,0,1,1), opacity .28s ease';
            c.style.transform = `translateX(${tx}px) rotate(${rot}deg)`;
            c.style.opacity = '0';
            setTimeout(cb, 300);
        }

        function updateProg() {
            const totalQuestions = deck.filter(item => item.type !== 'wildcard').length;
            const answeredQuestions = deck.slice(0, idx).filter(item => item.type !== 'wildcard').length;
            const pct = totalQuestions > 0 ? Math.round((answeredQuestions / totalQuestions) * 100) : 0;
            document.getElementById('pFill').style.width = pct + '%';
            document.getElementById('pTxt').textContent = answeredQuestions + ' / ' + totalQuestions;
            const prevBtn = document.getElementById('prevBtn');
            prevBtn.disabled = history.length === 0;
            prevBtn.style.opacity = history.length === 0 ? '0.3' : '1';
        }

        function showDone() {
            document.getElementById('game').style.display = 'none';
            document.getElementById('done').style.display = 'flex';
        }

        // ─── Pointer / touch events ─────
        const card = document.getElementById('card');
        card.addEventListener('click', () => {
            if (Math.abs(dx) >= 8) return;
            if (!flipped) { flipped = true;
                showFront(); } else { next(); }
        });
        card.addEventListener('pointerdown', e => {
            dragging = true;
            sx = e.clientX;
            sy = e.clientY;
            dx = 0;
            dy = 0;
            card.setPointerCapture(e.pointerId);
            card.style.transition = 'none';
        });
        card.addEventListener('pointermove', e => {
            if (!dragging) return;
            dx = e.clientX - sx;
            dy = e.clientY - sy;
            card.style.transform = `translateX(${dx}px) translateY(${dy*.2}px) rotate(${dx*.06}deg)`;
            const r = Math.min(Math.abs(dx) / 100, 1);
            document.getElementById('swYes').style.opacity = dx > 20 ? r : '0';
            document.getElementById('swNo').style.opacity = dx < -20 ? r : '0';
        });
        card.addEventListener('pointerup', () => {
            if (!dragging) return;
            dragging = false;
            document.getElementById('swYes').style.opacity = '0';
            document.getElementById('swNo').style.opacity = '0';
            if (Math.abs(dx) > 90) { if (dx > 0) next();
                else skip(); } else { card.style.transition =
                    'transform .35s cubic-bezier(.34,1.56,.64,1)';
                card.style.transform = ''; }
        });
        card.addEventListener('pointercancel', () => {
            dragging = false;
            card.style.transition = 'transform .3s ease';
            card.style.transform = '';
        });
    </script>
</body>
</html>
