<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Breaking Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #F7F4EF;
    --ink:   #0D0D0D;
    --muted: #7A7068;
    --white: #FFFFFF;
    --wine:  #9a0526;
    --card-w: min(340px, 88vw);
    --card-h: min(480px, 66vh);   /* compressed height */
    --ac: #FF2E63;
    --act: #FFF4F7;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; position: relative; overflow: hidden;
  }

  /* ═══════════════════════════════════════════════════
     SPLASH
  ═══════════════════════════════════════════════════ */
  #splash {
    position: fixed; inset: 0;
    background: #000000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200; overflow: hidden;
  }
  #splash::before {
    content: '';
    position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .sp-noise {
    position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: .35;
  }
  .sp-floats { position: absolute; inset: 0; pointer-events: none; }
  .sp-f {
    position: absolute; border-radius: 16px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
  }
  .sp-f:nth-child(1){width:74px;height:106px;top:5%;left:3%;transform:rotate(-18deg);}
  .sp-f:nth-child(2){width:62px;height:90px;top:8%;right:5%;transform:rotate(14deg);}
  .sp-f:nth-child(3){width:82px;height:114px;bottom:8%;left:5%;transform:rotate(11deg);}
  .sp-f:nth-child(4){width:66px;height:96px;bottom:6%;right:4%;transform:rotate(-13deg);}
  .sp-f:nth-child(5){width:50px;height:70px;top:43%;left:2%;transform:rotate(-5deg);opacity:.35;}
  .sp-f:nth-child(6){width:54px;height:76px;top:41%;right:2%;transform:rotate(6deg);opacity:.35;}

  .sp-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(255,255,255,.45); margin-bottom: 16px;
    animation: fdD .7s ease both; position: relative; z-index: 1;
  }
  .sp-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: clamp(58px, 13vw, 96px);
    color: var(--white); line-height: .9;
    text-align: center; letter-spacing: -2px;
    animation: fdD .7s .07s ease both; margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .sp-rule {
    width: 36px; height: 2px; background: rgba(255,255,255,.28);
    margin-bottom: 20px; animation: fdD .7s .14s ease both;
    position: relative; z-index: 1;
  }
  .sp-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 15px; color: rgba(255,255,255,.6);
    text-align: center; max-width: 240px; line-height: 1.65;
    margin-bottom: 10px; animation: fdD .7s .19s ease both;
    position: relative; z-index: 1;
  }
  .sp-count {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 11px; letter-spacing: 3px;
    color: rgba(255,255,255,.32); text-transform: uppercase;
    margin-bottom: 42px; animation: fdD .7s .24s ease both;
    position: relative; z-index: 1;
  }
  .sp-play {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--wine); background: var(--white);
    border: none; border-radius: 999px;
    padding: 16px 62px; cursor: pointer; transition: all .22s;
    animation: fdU .7s .29s ease both; position: relative; z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,.22);
  }
  .sp-play:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.3); }
  .sp-play:active { transform: translateY(0); }

  /* ═══════════════════════════════════════════════════
     GAME
  ═══════════════════════════════════════════════════ */
  #game {
    display: none; flex-direction: column;
    align-items: center; width: 100%; padding: 0 1rem;
    gap: 0; position: relative; z-index: 1;
  }

  body::before {
    content: ''; position: fixed; top: -20%; right: -10%;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(154,5,38,.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* Top bar */
  .topbar {
    width: 100%; max-width: 400px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 0.7rem;
    animation: fdD .5s ease both;
    position: relative; z-index: 50;
  }
  .home-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 999px;
    border: 1.5px solid rgba(0,0,0,.12); background: var(--white);
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--ink); cursor: pointer; transition: all .18s; flex-shrink: 0;
  }
  .home-btn:hover { background: #EBEBEB; border-color: rgba(0,0,0,.22); }
  .home-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .filter-wrap { flex: 1; position: relative; }

  .cat-btn {
    width: 100%; padding: 8px 30px 8px 14px; border-radius: 999px;
    border: 1.5px solid rgba(0,0,0,.12); background: var(--white);
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink);
    cursor: pointer; outline: none; text-align: left; transition: background .2s, color .2s, border-color .2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cat-btn:focus { border-color: rgba(0,0,0,.26); }
  .cat-btn.wildcard-active {
    background: #F59E0B;
    color: #1F2937;
    border-color: rgba(0,0,0,.15);
  }

  .cat-panel {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--white); border: 1.5px solid rgba(0,0,0,.1);
    border-radius: 16px; padding: 8px; z-index: 9999;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    max-height: 260px; overflow-y: auto;
  }
  .cat-panel.open { display: block; }

  .cat-option {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 10px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink);
    transition: background .15s; user-select: none;
  }
  .cat-option:hover { background: rgba(0,0,0,.04); }
  .cat-option input { display: none; }
  .cat-check {
    width: 16px; height: 16px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,.2); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .cat-option input:checked ~ .cat-check {
    background: var(--ink); border-color: var(--ink);
  }
  .cat-check svg { display: none; width: 10px; height: 10px; stroke: white; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .cat-option input:checked ~ .cat-check svg { display: block; }
  .cat-divider { height: 1px; background: rgba(0,0,0,.07); margin: 4px 0; }

  .players {
    display: flex; gap: 0; background: var(--white);
    border: 1.5px solid rgba(0,0,0,.1); border-radius: 999px; padding: 3px;
    margin-bottom: 0.75rem;
    animation: fdD .5s .02s ease both;
  }
  .player-btn {
    padding: 7px 22px; border-radius: 999px; border: none; background: transparent;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted);
    cursor: pointer; transition: all .2s;
  }
  .player-btn.active { background: var(--ac); color: var(--act); }

  .deck-row {
    display: flex; align-items: center; justify-content: center;
    gap: 0; position: relative;
    width: 100%; margin-bottom: 0.8rem;
    animation: fdU .5s .05s ease both;
  }

  .deck { position: relative; width: var(--card-w); height: var(--card-h); margin-bottom: 0.8rem; animation: fdU .5s .05s ease both; }
  .ghost { position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 24px; pointer-events: none; }
  .ghost-2 { background: rgba(0,0,0,.055); transform: translate(9px,9px) rotate(2.8deg); z-index: 1; }
  .ghost-1 { background: rgba(0,0,0,.1); transform: translate(4px,4px) rotate(1.3deg); z-index: 2; }

  .card {
    position: absolute; top: 0; left: 0;
    width: var(--card-w); height: var(--card-h);
    border-radius: 24px; z-index: 10; cursor: pointer;
    user-select: none; touch-action: none; will-change: transform; overflow: hidden;
  }
  .card-face {
    position: absolute; inset: 0; border-radius: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2.5rem 2rem;
    transition: opacity .3s ease;
  }

  /* BACK */
  .card-back {
    background: var(--white);
    border: 1.5px solid rgba(0,0,0,.09);
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .card-back.wildcard-back {
    background: #F59E0B;
    border: 1.5px solid rgba(0,0,0,.15);
  }
  .card-back.wildcard-back .back-badge {
    color: rgba(255,255,255,.7);
  }
  .card-back.wildcard-back .back-orb {
    background: rgba(255,255,255,.25);
    border: 1.5px solid rgba(0,0,0,.1);
  }
  .card-back.wildcard-back .back-orb svg {
    fill: #1F2937;
  }
  .card-back.wildcard-back .back-title {
    color: #1F2937;
  }
  .card-back.wildcard-back .back-sub {
    color: #1F2937;
  }
  .card-back.wildcard-back .back-hint {
    color: rgba(0,0,0,.3);
  }
  .card-back.wildcard-back .back-swipe {
    color: rgba(0,0,0,.3);
  }
  .back-badge {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(0,0,0,.18);
  }
  .back-orb {
    width: 64px; height: 64px; border-radius: 50%;
    background: #F1EEF9; border: 1.5px solid rgba(0,0,0,.07);
    display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;
  }
  .back-orb svg { width: 28px; height: 28px; fill: var(--muted); }
  .back-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px; font-weight: 700; color: var(--ink);
    margin-bottom: 4px; text-align: center; letter-spacing: -.3px;
  }
  .back-sub {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 400; color: var(--muted);
    text-align: center; line-height: 1.6; max-width: 190px;
  }
  .back-hint {
    position: absolute; bottom: 16px; left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 600; color: rgba(0,0,0,.2);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .back-swipe {
    position: absolute; bottom: 34px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 26px; font-family: 'Inter', sans-serif;
    font-size: 10px; color: rgba(0,0,0,.22); font-weight: 600; letter-spacing: .5px;
  }

  /* FRONT */
  .card-front { opacity: 0; pointer-events: none; }
  .card-front.vis { opacity: 1; pointer-events: auto; }
  .card-back.gone { opacity: 0; pointer-events: none; }

  .cat-lbl {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,.55); font-weight: 700; white-space: nowrap;
  }
  .q-num {
    position: absolute; top: 20px; right: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; color: rgba(255,255,255,.25); font-weight: 600;
  }
  .q-text {
    font-family: 'Inter', sans-serif;
    font-size: clamp(16px, 3.6vw, 20px); font-weight: 500;
    text-align: center; line-height: 1.5; z-index: 1;
    color: var(--qt, #FFFFFF);
  }
  .card-front::before {
    content: ''; position: absolute; bottom: -60px; right: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(255,255,255,.06); pointer-events: none;
  }
  .card-front::after {
    content: ''; position: absolute; top: -40px; left: -40px;
    width: 150px; height: 150px; border-radius: 50%;
    background: rgba(255,255,255,.04); pointer-events: none;
  }
  .tap-next {
    position: absolute; bottom: 16px; left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    opacity: .3; color: var(--qt, #FFFFFF);
  }

  .sw-yes, .sw-no {
    position: absolute; top: 22px; padding: 4px 13px; border-radius: 7px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    opacity: 0; pointer-events: none; z-index: 20;
  }
  .sw-yes { right: 18px; border: 2px solid #22C55E; color: #22C55E; background: rgba(255,255,255,.92); }
  .sw-no  { left: 18px;  border: 2px solid #EF4444; color: #EF4444; background: rgba(255,255,255,.92); }

  /* Progress */
  .prog-wrap { width: var(--card-w); margin-bottom: 0.7rem; animation: fdU .5s .1s ease both; }
  .prog-bar { height: 3px; background: rgba(0,0,0,.08); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .prog-fill { height: 100%; background: var(--ac); border-radius: 2px; transition: width .4s ease; }
  .prog-txt {
    font-family: 'Inter', sans-serif;
    font-size: 11px; color: var(--muted); text-align: center; font-weight: 600;
  }

  /* Actions */
  .actions { display: flex; gap: 9px; animation: fdU .5s .15s ease both; margin-bottom: 0.2rem; }
  .btn {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 999px;
    border: 1.5px solid rgba(0,0,0,.12); background: var(--white);
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink);
    cursor: pointer; transition: all .18s;
  }
  .btn:hover { background: #EBEBEB; border-color: rgba(0,0,0,.22); }
  .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn.primary { background: var(--ac); border-color: var(--ac); color: var(--act); }
  .btn.primary:hover { filter: brightness(.9); }
  .btn.primary svg { stroke: var(--act); }

  #done {
    display: none; flex-direction: column; align-items: center; text-align: center;
    gap: 1rem; padding: 2rem; animation: fdU .5s ease both; position: relative; z-index: 1;
  }
  .done-icon {
    width: 76px; height: 76px; background: rgba(154,5,38,.08);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: 1.5px solid rgba(154,5,38,.15);
  }
  .done-icon svg { width: 34px; height: 34px; fill: var(--wine); }
  #done h2 { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; color: var(--ink); letter-spacing: -.5px; }
  #done p { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--muted); max-width: 280px; line-height: 1.65; }

  @keyframes fdD { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fdU { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes cardIn { from{opacity:0;transform:scale(.93) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .popin { animation: cardIn .28s ease both; }
</style>
</head>
<body>

<!-- ═══ SPLASH ════════════════════════════════════════ -->
<div id="splash">
  <div class="sp-noise"></div>
  <div class="sp-floats">
    <div class="sp-f"></div><div class="sp-f"></div>
    <div class="sp-f"></div><div class="sp-f"></div>
    <div class="sp-f"></div><div class="sp-f"></div>
  </div>
  <div class="sp-eyebrow">card game</div>
  <div class="sp-title">Breaking<br>Talk</div>
  <div class="sp-rule"></div>
  <div class="sp-sub">Questions that go deeper than small talk.</div>
  <div class="sp-count" id="totalCount" style="display:none"></div>
  <button class="sp-play" onclick="startGame()">Play</button>
</div>

<!-- ═══ GAME ══════════════════════════════════════════ -->
<div id="game">
  <div class="topbar">
    <button class="home-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <div class="filter-wrap" id="filterWrap">
      <button class="cat-btn" id="catBtn" onclick="toggleCatPanel()">All categories</button>
      <svg style="position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      <div class="cat-panel" id="catPanel">
        <label class="cat-option"><input type="checkbox" id="chkAll" checked onchange="onChkAll(this)"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>All categories</label>
        <div class="cat-divider"></div>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="GLITCH SOCIAL" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>😈 GLITCH SOCIAL</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="HUMAN RADAR" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>🎯 HUMAN RADAR</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="CONNECTION" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>🌊 CONNECTION</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="IDENTITY" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>🪩 IDENTITY</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="RABBIT HOLE" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>🕳️ RABBIT HOLE</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="CHAOTIC HYPOTHETICALS" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>💥 CHAOTIC HYPOTHETICALS</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="STORIES" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>📼 STORIES</label>
        <label class="cat-option"><input type="checkbox" class="cat-chk" value="SPARK" onchange="onChkCat()"><div class="cat-check"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>🔥 SPARK</label>
      </div>
    </div>
  </div>

  <div class="players">
    <button class="player-btn active" id="t1" onclick="setP(1)">Player 1</button>
    <button class="player-btn" id="t2" onclick="setP(2)">Player 2</button>
  </div>

  <div class="deck-row">
    <div class="deck">
      <div class="ghost ghost-2"></div>
      <div class="ghost ghost-1"></div>
      <div class="card" id="card">
        <div class="card-face card-back" id="cBack">
          <div class="back-badge" id="backBadge">Breaking Talk</div>
          <div class="back-orb">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </div>

function txt(c){ return CAT[c]?.tx || '#FFFFFF'; }
function setTheme(c){
  document.documentElement.style.setProperty('--ac', col(c));
  document.documentElement.style.setProperty('--act', txt(c));
}

function getThemeCategory(item){
  return item.type === 'wildcard' ? 'WILDCARDS' : item.c;
}

function startGame(){
  const s=document.getElementById('splash');
  s.style.transition='opacity .45s ease'; s.style.opacity='0';
  setTimeout(()=>{ s.style.display='none'; document.getElementById('game').style.display='flex'; resetGame(); }, 450);
}
function goHome(){
  document.getElementById('game').style.display='none';
  document.getElementById('done').style.display='none';
  const s=document.getElementById('splash');
  s.style.display='flex'; s.style.opacity='1'; s.style.transition='';
  document.getElementById('chkAll').checked=true;
  document.querySelectorAll('.cat-chk').forEach(c=>c.checked=false);
  updateCatBtn();
}
function toggleCatPanel(){
  const panel = document.getElementById('catPanel');
  panel.classList.toggle('open');
}
document.addEventListener('click', e=>{
  const wrap = document.getElementById('filterWrap');
  if(wrap && !wrap.contains(e.target)) document.getElementById('catPanel').classList.remove('open');
});
function selectedCats(){
  const chkAll = document.getElementById('chkAll');
  if(chkAll.checked) return null;
  const checked = [...document.querySelectorAll('.cat-chk:checked')].map(c=>c.value);
  return checked.length ? checked : null;
}
function updateCatBtn(){
  const cats = selectedCats();
  const btn = document.getElementById('catBtn');
  btn.classList.remove('wildcard-active');
  if(!cats || cats.length === 0){
    btn.textContent = 'All categories';
  } else if(cats.length === 1){
    btn.textContent = cats[0];
  } else {
    btn.textContent = cats.length + ' categories';
  }
}
function onChkAll(el){
  if(el.checked){
    document.querySelectorAll('.cat-chk').forEach(c=>c.checked=false);
  }
  updateCatBtn(); resetGame();
}
function onChkCat(){
  const anyChecked = [...document.querySelectorAll('.cat-chk:checked')].length > 0;
  document.getElementById('chkAll').checked = !anyChecked;
  updateCatBtn(); resetGame();
}
function onFilter(){ resetGame(); }

function filtered(){
  const cats = selectedCats();
  return (!cats || cats.length === 0) ? Q : Q.filter(q=>cats.includes(q.c));
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function injectWildcards(qs){
  const wcPool = shuffle([...WILDCARDS]);
  let wi = 0;
  const result = [];
  for (let q of qs) {
    if (Math.random() < 0.08) {
      result.push({ type: 'wildcard', wc: wcPool[wi++ % wcPool.length].q });
    }
    result.push({ type: 'question', ...q });
  }
  return result;
}
function resetGame(){
  const base = shuffle(filtered());
  deck = injectWildcards(base);
  idx=0; flipped=false;
  document.getElementById('game').style.display='flex';
  document.getElementById('done').style.display='none';
  setTheme(getThemeCategory(deck[0]) || 'GLITCH SOCIAL');
  renderCard(); updateProg();
  updateTopBarForCard();
}
function setP(n){
  player=n;
  document.getElementById('t1').classList.toggle('active', n===1);
  document.getElementById('t2').classList.toggle('active', n===2);
}

function updateTopBarForCard(){
  const item = deck[idx];
  const btn = document.getElementById('catBtn');
  if (item && item.type === 'wildcard') {
    btn.textContent = '🃏 Wildcard';
    btn.classList.add('wildcard-active');
  } else {
    updateCatBtn();
  }
}

function renderCard(){
  const c=document.getElementById('card');
  flipped=false;
  c.style.transform=''; c.style.opacity='1'; c.style.transition='';
  document.getElementById('cBack').classList.remove('gone');
  document.getElementById('cFront').classList.remove('vis');
  c.classList.add('popin'); setTimeout(()=>c.classList.remove('popin'), 350);
  document.getElementById('swYes').style.opacity='0';
  document.getElementById('swNo').style.opacity='0';

  const item = deck[idx];
  const cBack = document.getElementById('cBack');
  const badge = document.getElementById('backBadge');
  const title = document.getElementById('backTitle');
  if (item && item.type === 'wildcard') {
    badge.textContent = '🃏 Wildcard';
    title.textContent = 'Reveal Wildcard';
    cBack.classList.add('wildcard-back');
  } else {
    badge.textContent = 'Breaking Talk';
    title.textContent = 'Tap to reveal';
    cBack.classList.remove('wildcard-back');
  }
  updateTopBarForCard();
}
function showFront(){
  if(idx>=deck.length) return;
  const item=deck[idx];
  let cat, text;
  if(item.type==='wildcard'){
    cat = 'WILDCARDS';
    text = item.wc;
    document.getElementById('catLbl').textContent = '🃏 Wildcard';
    document.getElementById('qTxt').textContent = text;
  } else {
    cat = item.c;
    text = item.q;
    document.getElementById('catLbl').textContent = item.c;
    document.getElementById('qTxt').textContent = text;
  }
  const bg=col(cat), tx=txt(cat);
  const front=document.getElementById('cFront');
  front.style.background=bg;
  front.style.setProperty('--qt', tx);
  document.getElementById('qNum').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('cBack').classList.add('gone');
  front.classList.add('vis');
}
function next(){
  const currentItem = deck[idx];
  animOut('right', ()=>{
    if (currentItem && currentItem.type !== 'wildcard') {
      toggleP();   // only toggle player if leaving a question
    }
    idx++;
    if(idx>=deck.length){ showDone(); return; }
    setTheme(getThemeCategory(deck[idx]));
    renderCard(); updateProg();
  });
}
function skip(){
  const currentItem = deck[idx];
  animOut('left', ()=>{
    if (currentItem && currentItem.type !== 'wildcard') {
      toggleP();
    }
    idx++;
    if(idx>=deck.length){ showDone(); return; }
    setTheme(getThemeCategory(deck[idx]));
    renderCard(); updateProg();
  });
}
function toggleP(){
  player=player===1?2:1;
  document.getElementById('t1').classList.toggle('active', player===1);
  document.getElementById('t2').classList.toggle('active', player===2);
}
function prev(){
  if(idx<=0) return;
  animIn('left', ()=>{
    idx--;
    setTheme(getThemeCategory(deck[idx])); renderCard(); updateProg();
  });
}
function animIn(dir, cb){
  const c=document.getElementById('card');
  const startX = dir==='left' ? -520 : 520;
  c.style.transition='none';
  c.style.transform=`translateX(${startX}px) rotate(${dir==='left'?-15:15}deg)`;
  c.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    cb();
    requestAnimationFrame(()=>{
      c.style.transition='transform .35s cubic-bezier(.34,1.2,.64,1), opacity .25s ease';
      c.style.transform='';
      c.style.opacity='1';
    });
  }));
}
function animOut(dir, cb){
  const c=document.getElementById('card');
  const tx=dir==='right'?520:-520, rot=dir==='right'?20:-20;
  c.style.transition='transform .3s cubic-bezier(.4,0,1,1), opacity .28s ease';
  c.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
  c.style.opacity='0';
  setTimeout(cb, 300);
}
function updateProg(){
  const t=deck.length, pct=t>0?Math.round((idx/t)*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pTxt').textContent=idx+' of '+t+' played';
  const prevBtn=document.getElementById('prevBtn');
  prevBtn.disabled=idx<=0;
  prevBtn.style.opacity=idx<=0?'.35':'1';
}
function showDone(){
  document.getElementById('game').style.display='none';
  document.getElementById('done').style.display='flex';
}

// ── Pointer events ─────────────────────────────────────────
const card=document.getElementById('card');
card.addEventListener('click', ()=>{
  if(Math.abs(dx)>=8) return;
  if(!flipped){ flipped=true; showFront(); }
  else { next(); }
});
card.addEventListener('pointerdown', e=>{
  dragging=true; sx=e.clientX; sy=e.clientY; dx=0; dy=0;
  card.setPointerCapture(e.pointerId); card.style.transition='none';
});
card.addEventListener('pointermove', e=>{
  if(!dragging) return;
  dx=e.clientX-sx; dy=e.clientY-sy;
  card.style.transform=`translateX(${dx}px) translateY(${dy*.22}px) rotate(${dx*.07}deg)`;
  const r=Math.min(Math.abs(dx)/100,1);
  document.getElementById('swYes').style.opacity=dx>20?r:'0';
  document.getElementById('swNo').style.opacity=dx<-20?r:'0';
});
card.addEventListener('pointerup', ()=>{
  if(!dragging) return; dragging=false;
  document.getElementById('swYes').style.opacity='0';
  document.getElementById('swNo').style.opacity='0';
  if(Math.abs(dx)>90){ if(dx>0) next(); else skip(); }
  else { card.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)'; card.style.transform=''; }
});
card.addEventListener('pointercancel', ()=>{
  dragging=false; card.style.transition='transform .3s ease'; card.style.transform='';
});
</script>
</body>
</html>
